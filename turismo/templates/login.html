{% extends 'base.html' %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center py-10">
    <div class="bg-white rounded-2xl shadow-2xl flex w-full max-w-4xl overflow-hidden">
        
        <div class="w-full md:w-1/2 p-8 md:p-12">
            <h2 class="text-3xl font-bold text-blue-900 mb-2">¡Hola de nuevo! 👋</h2>
            <p class="text-gray-500 mb-8">Ingresa tus credenciales para continuar explorando.</p>
            
            <form method="POST" class="space-y-6">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary w-full bg-blue-600 hover:bg-blue-700 border-none text-white text-lg">Ingresar</button>
            </form>
            <p class="mt-6 text-center text-sm text-gray-600">
                ¿Aún no tienes cuenta? <a href="{% url 'registro' %}" class="text-blue-600 font-bold hover:underline">Regístrate aquí</a>
            </p>
        </div>

        <div class="hidden md:block w-1/2 bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1544644181-1484b3f8c853?q=80&w=1000&auto=format&fit=crop');">
        </div>
    </div>
</div>
{% endblock %}
