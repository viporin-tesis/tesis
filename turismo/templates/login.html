{% extends 'base.html' %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-xl shadow-2xl border border-gray-100">
        
        <div class="text-center">
            <h2 class="mt-6 text-3xl font-extrabold text-blue-900">
                Bienvenido de vuelta
            </h2>
            <p class="mt-2 text-sm text-gray-600">
                Ingresa para continuar explorando Pucusana.
            </p>
        </div>

        <form class="mt-8 space-y-6" method="POST">
            {% csrf_token %}
            
            <div class="rounded-md shadow-sm -space-y-px">
                <style>
                    form input { width: 100%; padding: 0.5rem; margin-bottom: 1rem; border: 1px solid #d1d5db; border-radius: 0.375rem; }
                    form label { font-weight: 500; color: #374151; font-size: 0.875rem; }
                    .errorlist { color: #ef4444; font-size: 0.875rem; margin-bottom: 1rem; }
                </style>
                
                {{ form.as_p }}
            </div>

            <div>
                <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 transition-colors">
                    Ingresar 🔑
                </button>
            </div>
            
            <div class="text-sm text-center mt-4">
                <a href="{% url 'registro' %}" class="font-medium text-blue-600 hover:text-blue-500">
                    ¿No tienes cuenta? Regístrate aquí
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
