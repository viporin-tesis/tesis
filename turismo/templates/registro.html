{% extends 'base.html' %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-xl shadow-2xl border border-gray-100">
        
        <div class="text-center">
            <h2 class="mt-6 text-3xl font-extrabold text-blue-900">
                Únete a Explora Pucusana
            </h2>
            <p class="mt-2 text-sm text-gray-600">
                Crea tu cuenta para guardar lugares, dejar reseñas y recibir recomendaciones inteligentes.
            </p>
        </div>

        <form class="mt-8 space-y-6" method="POST">
            {% csrf_token %} <div class="rounded-md shadow-sm -space-y-px">
                <style>
                    form input {
                        width: 100%;
                        padding: 0.5rem;
                        margin-bottom: 1rem;
                        border: 1px border-gray-300;
                        border-radius: 0.375rem;
                        background-color: #f9fafb;
                    }
                    form label {
                        font-weight: 500;
                        color: #374151;
                        font-size: 0.875rem;
                    }
                    form ul.errorlist {
                        color: #ef4444;
                        font-size: 0.875rem;
                        margin-bottom: 1rem;
                    }
                    .helptext {
                        font-size: 0.75rem;
                        color: #6b7280;
                        display: block;
                        margin-bottom: 0.5rem;
                    }
                </style>
                
                {{ form.as_p }}
            </div>

            <div>
                <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                    Crear Cuenta Turista 🎒
                </button>
            </div>
            
            <div class="text-sm text-center mt-4">
                <a href="{% url 'login' %}" class="font-medium text-blue-600 hover:text-blue-500">
                    ¿Ya tienes cuenta? Inicia sesión aquí
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
