{% extends 'base.html' %}

{% block content %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<div class="container mx-auto p-4">
    <div class="mb-4 flex justify-between items-center">
        <h2 class="text-3xl font-bold text-blue-900">Mapa Turístico de Pucusana 🗺️</h2>
        <a href="{% url 'index' %}" class="btn btn-outline btn-sm text-blue-700">⬅️ Volver al catálogo</a>
    </div>

    <div id="mi_mapa" class="shadow-xl border-4 border-white" style="height: 600px; border-radius: 15px; z-index: 1;"></div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        // 1. Inicializar el mapa centrado en la Plaza de Pucusana
        var map = L.map('mi_mapa').setView([-12.4830, -76.7960], 15);

        // 2. Agregar la capa base (Las calles y colores gratuitos de OpenStreetMap)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors',
            maxZoom: 19
        }).addTo(map);

        // 3. Un ciclo de Django dentro de JavaScript para pintar todos tus lugares
        {% for lugar in lugares %}
            // Extraemos las coordenadas de la base de datos
            var lat = "{{ lugar.latitud|safe|default:'-12.4830' }}";
            var lng = "{{ lugar.longitud|safe|default:'-76.7960' }}";
            
            // Creamos el pin en el mapa
            var marcador = L.marker([lat, lng]).addTo(map);

            // Le agregamos una tarjetita flotante (Popup) cuando le hagan clic
            marcador.bindPopup(`
                <div class="text-center p-2">
                    <strong class="text-lg text-blue-900 block mb-1">{{ lugar.nombre }}</strong>
                    <a href="/lugar/{{ lugar.id }}/" class="btn btn-sm bg-blue-600 text-white border-none hover:bg-blue-500 mt-2">
                        Ver Detalles 📍
                    </a>
                </div>
            `);
        {% endfor %}
    });
</script>
{% endblock %}
